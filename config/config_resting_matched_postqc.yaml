project:
  name: asd_eeg_aperiodic_study
  random_seed: 42
paths:
  raw_data: data/raw
  participants_file: data/participants/participants_resting_matched_postqc.csv
  derivatives_root: derivatives_matched_postqc
  outputs_root: outputs_matched_resting_postqc
  logs_dir: derivatives_matched_postqc/logs
eeg:
  system: EGI HydroCel GSN-64 1.0
  default_format: mff
  montage: GSN-HydroCel-64_1.0
  channel_naming: E
  original_sfreq_hz: 500
  recording_duration_sec: 300
  resting_condition: eyes_open
  original_reference: Cz
  exclude_channels:
  - VREF
  - Cz
  - E65
  keep_channels_eeg: E1-E64
  sampling_rate_target: 250
filter:
  highpass_hz: 0.5
  lowpass_hz: 45.0
  notch_hz: 50.0
  notch_enabled: true
reference:
  method: average
epochs:
  duration_sec: 2.0
  overlap_sec: 0.0
  min_usable_epochs: 60
  reject_amplitude_uv: 500.0
ica:
  n_components: 30
  method: fastica
  random_state: 42
  manual_review: false
  ica_labels_dir: derivatives/preprocessed/ica_labels
psd:
  freq_min_hz: 1.0
  freq_max_hz: 40.0
  welch:
    n_fft: 500
    n_overlap: 250
    window: hamming
    fmin: 1.0
    fmax: 40.0
specparam:
  freq_range:
  - 1.0
  - 40.0
  peak_width_limits:
  - 1.0
  - 8.0
  max_n_peaks: 6
  min_peak_height: 0.1
  peak_threshold: 2.0
  aperiodic_mode: fixed
  verbose: false
fit_quality:
  min_r_squared: 0.9
  exponent_min: 0.0
  exponent_max: 5.0
  fit_error_top_percentile: 5.0
  subject_invalid_channel_ratio_max: 0.2
bands:
  theta:
  - 4.0
  - 7.0
  alpha:
  - 8.0
  - 13.0
  beta:
  - 13.0
  - 30.0
  low_gamma:
  - 30.0
  - 40.0
covariates:
- age_months
- sex
- IQ_total
- usable_epochs
groups:
  asd_label: ASD
  td_label: TD
sensitivity:
  freq_ranges:
  - - 1.0
    - 40.0
  - - 2.0
    - 40.0
  - - 1.0
    - 35.0
  - - 2.0
    - 35.0
  min_epochs_thresholds:
  - 30
  - 60
  aperiodic_modes:
  - fixed
  - knee
processing:
  n_jobs: -1
  overwrite: true
iclabel_sensitivity:
  random_state: 97
  variance_explained: 0.99
  max_components: 30
  ica_method: infomax
  prefer_mff_for_ica: true
  ica_highpass_hz: 1.0
  ica_lowpass_hz: 100.0
  retained_artifact_flag: 0.3
  default_thresholds:
  - 0.8
  - 0.7
