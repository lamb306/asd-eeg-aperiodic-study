project:
  name: asd_eeg_aperiodic_study_external_hbn_100x2_eyes_open
  random_seed: 42
paths:
  raw_data: data/external_hbn_eeg
  participants_file: data/participants/external_validation_subjects_hbn_eeg_balanced_100x2.csv
  derivatives_root: derivatives_external_hbn/rsting_200/resting_100x2_eyes_open
  outputs_root: outputs_external_hbn/resting_100x2_eyes_open
  logs_dir: derivatives_external_hbn/rsting_200/resting_100x2_eyes_open/logs
eeg:
  system: HBN EGI 128-channel GSN 200 v2.1 (analysis E1-E64)
  default_format: set
  montage: GSN-HydroCel-64_1.0
  channel_naming: E
  original_sfreq_hz: 500
  recording_duration_sec: 200
  task_condition: resting_external_hbn
  resting_condition: eyes_open
  hbn_resting_segment_mode: eyes_open
  original_reference: Cz
  exclude_channels:
  - VREF
  - Cz
  - E65
  keep_channels_eeg: E1-E64
  sampling_rate_target: 250
filter:
  highpass_hz: 0.5
  lowpass_hz: 45.0
  notch_hz: 60.0
  notch_enabled: true
reference:
  method: average
epochs:
  duration_sec: 2.0
  overlap_sec: 0.0
  min_usable_epochs: 60
  reject_amplitude_uv: 500.0
ica:
  n_components: 30
  method: fastica
  random_state: 42
  manual_review: false
  ica_labels_dir: derivatives_external_hbn/rsting_200/resting_100x2_eyes_open/preprocessed/ica_labels
psd:
  freq_min_hz: 1.0
  freq_max_hz: 40.0
  welch:
    n_fft: 500
    n_overlap: 250
    window: hamming
    fmin: 1.0
    fmax: 40.0
specparam:
  freq_range:
  - 1.0
  - 40.0
  peak_width_limits:
  - 1.0
  - 8.0
  max_n_peaks: 6
  min_peak_height: 0.1
  peak_threshold: 2.0
  aperiodic_mode: fixed
  verbose: false
fit_quality:
  min_r_squared: 0.9
  exponent_min: 0.0
  exponent_max: 5.0
  fit_error_top_percentile: 5.0
  subject_invalid_channel_ratio_max: 0.2
groups:
  asd_label: ASD
  td_label: TD
processing:
  n_jobs: -1
  overwrite: true
