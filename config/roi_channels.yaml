# =============================================================================
# ROI 电极定义 — 32 导与 64 导常见 10-20 方案
# 通道名使用 MNE 标准命名（大写，无后缀）
# 若实际数据通道名不同，请在预处理阶段统一重命名
# =============================================================================

# 32 通道系统（示例：Neuroscan / Biosemi 32）
channels_32:
  frontal:
    - Fp1
    - Fp2
    - F3
    - F4
    - Fz
    - F7
    - F8
  central:
    - C3
    - C4
    - Cz
  temporal:
    - T3
    - T4
    - T5
    - T6
  parietal:
    - P3
    - P4
    - Pz
  occipital:
    - O1
    - O2
    - Oz

