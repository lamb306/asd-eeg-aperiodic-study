project:
  name: asd_eeg_aperiodic_study_external_hbn_movie_100x2_thepresent
  random_seed: 42

paths:
  raw_data: data/external_hbn_eeg
  selection_file: data/participants/external_validation_subjects_hbn_eeg_balanced_100x2.csv
  participants_file: data/participants/participants_external_hbn_100x2_movie.csv
  derivatives_root: derivatives_external_hbn/movie_100x2_thepresent
  outputs_root: outputs_external_hbn/movie_100x2_thepresent
  logs_dir: derivatives_external_hbn/movie_100x2_thepresent/logs

eeg:
  system: HBN EGI 128-channel GSN 200 v2.1 (analysis E1-E64)
  default_format: set
  montage: GSN-HydroCel-64_1.0
  channel_naming: E
  original_sfreq_hz: 500
  recording_duration_sec: 300
  task_condition: movie_watching_external_hbn
  movie_start_marker: VID+
  movie_crop_duration_sec: 300
  original_reference: Cz
  exclude_channels:
    - VREF
    - Cz
    - E65
  keep_channels_eeg: E1-E64
  sampling_rate_target: 250

filter:
  highpass_hz: 0.5
  lowpass_hz: 45.0
  notch_hz: 60.0
  notch_enabled: true

reference:
  method: average

epochs:
  duration_sec: 2.0
  overlap_sec: 0.0
  min_usable_epochs: 50
  reject_amplitude_uv: 500.0

ica:
  n_components: 30
  method: fastica
  random_state: 42
  manual_review: false
  ica_labels_dir: derivatives_external_hbn/movie_100x2_thepresent/preprocessed/ica_labels

psd:
  freq_min_hz: 1.0
  freq_max_hz: 40.0
  welch:
    n_fft: 500
    n_overlap: 250
    window: hamming
    fmin: 1.0
    fmax: 40.0
  sliding_window:
    enabled: true
    window_sec: 2.0
    step_sec: 0.5

specparam:
  freq_range: [1.0, 40.0]
  peak_width_limits: [1.0, 8.0]
  max_n_peaks: 6
  min_peak_height: 0.1
  peak_threshold: 2.0
  aperiodic_mode: fixed
  verbose: false
  dynamic:
    fit_mode: roi_mean
    target_channels: ["E33", "E36", "E37", "E38"]

fit_quality:
  min_r_squared: 0.80
  exponent_min: 0.0
  exponent_max: 5.0
  fit_error_top_percentile: 5.0
  subject_invalid_channel_ratio_max: 0.30

bands:
  theta: [4.0, 7.0]
  alpha: [8.0, 13.0]
  beta: [13.0, 30.0]
  low_gamma: [30.0, 40.0]

covariates:
  - age_months
  - sex
  - IQ_total
  - usable_epochs

groups:
  asd_label: ASD
  td_label: TD

processing:
  n_jobs: -1
  overwrite: true

# HBN ThePresent 与主研究 naturalistic movie 不同，无 mental/pain 事件标注。
# ISC 使用全片时间轴（overall），勿使用 data/movie_events.csv。
movie:
  isc_mode: overall
  stimulus: HBN_task-ThePresent
  event_labels_available: false
